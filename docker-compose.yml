version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1 # Postgres with pgvector extension
    container_name: recommendation_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recommendation_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: recommendation_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
